name: ai_or_aint
description: AI or Ain't - Distinguish real videos from AI-generated content
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0

  # Video Player (portrait support)
  video_player: ^2.8.2
  chewie: ^1.7.5

  # Swipe gestures
  flutter_card_swiper: ^7.0.1

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.1

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Device Info
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/videos/
